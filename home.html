<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BOYNEXTDOOR | 首页</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"Microsoft Yahei",sans-serif}
header{
  background:#003366;
  padding:16px 40px;
  display:flex;
  justify-content:space-between;
  align-items:center
}
.logo{
  font-size:22px;
  font-weight:bold;
  color:#ffffff
}
nav a{
  color:#87ceeb;
  text-decoration:none;
  margin-left:22px;
  font-size:16px
}
nav a:hover{color:#b3e5fc}
body{
  background: linear-gradient(180deg, #ffffff 0%, #f0f8ff 30%, #e0f0ff 60%, #cce7ff 100%);
  color:#000000;
  min-height:100vh
}
.container{
  max-width:1200px;
  margin:40px auto;
  padding:0 20px
}
/* 轮播图 3:2 比例设置 */
.carousel{
  position:relative;
  width:100%;
  /* 宽高比 3:2，宽度1200px 对应高度 800px */
  height:800px;
  overflow:hidden;
  border-radius:12px;
  margin-bottom:30px;
  box-shadow:0 3px 15px #b3d4f2
}
.carousel-slides{
  display:flex;
  transition:transform 0.5s ease-in-out;
  height:100%
}
.carousel-slide{
  min-width:100%;
  height:100%
}
.carousel-slide img{
  width:100%;
  height:100%;
  object-fit:cover
}
.carousel-btn{
  position:absolute;
  top:50%;
  transform:translateY(-50%);
  background:rgba(0,0,0,0.3);
  color:white;
  border:none;
  padding:12px;
  font-size:20px;
  cursor:pointer;
  border-radius:50%
}
.carousel-btn.prev{left:20px}
.carousel-btn.next{right:20px}
.carousel-dots{
  position:absolute;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  gap:8px
}
.dot{
  width:10px;
  height:10px;
  border-radius:50%;
  background:rgba(255,255,255,0.5);
  cursor:pointer
}
.dot.active{background:white}
/* 介绍卡片样式 */
.intro-card{
  background:#ffffff;
  padding:35px;
  border-radius:12px;
  box-shadow:0 3px 15px #b3d4f2;
  line-height:1.8
}
.intro-card h1{
  font-size:32px;
  color:#003366;
  margin-bottom:20px;
  text-align:center
}
.intro-card p{
  font-size:18px;
  margin-bottom:15px;
  text-indent:2em
}
.intro-card p:last-child{margin-bottom:0}
</style>
</head>
<body>
<header>
  <div class="logo">BOYNEXTDOOR</div>
  <nav>
    <a href="home.html">首页</a >
    <a href="members.html">成员介绍</a >
    <a href="works.html">音乐作品</a >
    <a href="variety.html">团综合集</a >
  </nav>
</header>
<div class="container">
  <!-- 轮播图区域 -->
  <div class="carousel">
    <div class="carousel-slides">
      <div class="carousel-slide"><img src="page/bnd_1.jpg" alt="BOYNEXTDOOR"></div>
      <div class="carousel-slide"><img src="page/bnd_2.jpg" alt="BOYNEXTDOOR"></div>
      <div class="carousel-slide"><img src="page/bnd_3.jpg" alt="BOYNEXTDOOR"></div>
      <div class="carousel-slide"><img src="page/bnd_4.jpg" alt="BOYNEXTDOOR"></div>
      <div class="carousel-slide"><img src="page/bnd_5.jpg" alt="BOYNEXTDOOR"></div>
      <div class="carousel-slide"><img src="page/bnd_6.jpg" alt="BOYNEXTDOOR"></div>
      <div class="carousel-slide"><img src="page/bnd_7.jpg" alt="BOYNEXTDOOR"></div>
      <div class="carousel-slide"><img src="page/bnd_8.jpg" alt="BOYNEXTDOOR"></div>
    </div>
    <button class="carousel-btn prev" onclick="prevSlide()">&#10094;</button>
    <button class="carousel-btn next" onclick="nextSlide()">&#10095;</button>
    <div class="carousel-dots">
      <span class="dot active" onclick="currentSlide(0)"></span>
      <span class="dot" onclick="currentSlide(1)"></span>
      <span class="dot" onclick="currentSlide(2)"></span>
      <span class="dot" onclick="currentSlide(3)"></span>
      <span class="dot" onclick="currentSlide(4)"></span>
      <span class="dot" onclick="currentSlide(5)"></span>
      <span class="dot" onclick="currentSlide(6)"></span>
      <span class="dot" onclick="currentSlide(7)"></span>
    </div>
  </div>
  <!-- 团队介绍区域 -->
  <div class="intro-card">
    <h1>BOYNEXTDOOR (보이넥스트도어)</h1>
    <p>BOYNEXTDOOR 是HYBE旗下 KOZ Entertainment （由ZICO创立）推出的6人男子演唱组合，于2023年5月30日正式出道，粉丝名为 ONEDOOR 。</p >
    <p>团名意为“隔壁男孩”，整体定位邻家、日常、好亲近，音乐风格以 Easy Listening + 青春叙事为核心，用贴近生活的歌词传递少年情感与日常故事。</p >
  </div>
</div>
<script>
let currentIndex = 0;
const slides = document.querySelector('.carousel-slides');
const dots = document.querySelectorAll('.dot');
function updateSlide() {
  slides.style.transform = `translateX(-${currentIndex * 100}%)`;
  dots.forEach((dot, i) => dot.classList.toggle('active', i === currentIndex));
}
function nextSlide() {
  currentIndex = (currentIndex + 1) % 8;
  updateSlide();
}
function prevSlide() {
  currentIndex = (currentIndex - 1 + 8) % 8;
  updateSlide();
}
function currentSlide(index) {
  currentIndex = index;
  currentIndex = index;
  updateSlide();
}
// 自动轮播
setInterval(nextSlide, 5000);
</script>
</body>
</html>
