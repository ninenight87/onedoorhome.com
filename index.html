<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BOYNEXTDOOR</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"Microsoft Yahei",sans-serif}
body{margin:0}
.hero{
  width:100%;
  height:100vh;
  background: url(page/team.jpg);
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
  display:flex;
  flex-direction:column;
  align-items:center;
  /* 内容整体上移 */
  justify-content: flex-start;
  padding-top: 120px;
  color:#ffffff;
  text-align:center;
}
.hero h1{
  font-size:42px;
  margin-bottom:15px;
  text-shadow: 0 2px 8px rgba(0,0,0,0.6);
}
.hero p{
  font-size:22px;
  margin-bottom:40px;
  text-shadow: 0 2px 6px rgba(0,0,0,0.6);
}
.btn{
  padding:12px 30px;
  background:#ffffff;
  color:#00509e;
  border:none;
  border-radius:6px;
  font-size:16px;
  cursor:pointer;
  transition:0.3s;
}
.btn:hover{
  background:#e6f2ff;
}
.hero .copyright{
  position:absolute;
  bottom:25px;
  font-size:14px;
  opacity:0.9;
  text-shadow: 0 1px 3px rgba(0,0,0,0.5);
}
</style>
</head>
<body>
<div class="hero">
  <h1>欢迎来到BOYNEXTDOOR的世界</h1>
  <p>who's there ? the BOYNEXTDOOR !</p >
  <button class="btn" onclick="location.href='home.html'">点击进入</button>
  <div class="copyright">@BOYNEXTDOOR</div>
</div>
</body>
</html>
